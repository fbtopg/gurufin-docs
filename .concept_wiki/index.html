const pages = [{"name": "Overview", "file": "overview.md", "content": "# Project Knowledge Base Overview\n\nThis knowledge base serves as a comprehensive resource for understanding the Gurufin project. It is structured into distinct modules, each focusing on a specific aspect of the platform, from its core architecture and decentralized exchange to its governance model and compliance frameworks. The project comprises 426 unique concepts interconnected by 511 relationships, organized into 48 clusters for logical navigation.\n\n## Project Structure Summary\n\nThe Gurufin project is designed around a robust decentralized finance (DeFi) ecosystem, centered on a stablecoin and a decentralized exchange (DEX). Key functionalities include cross-border payments, interchain operability, and advanced smart contract capabilities. Governance is community-driven, ensuring a decentralized and resilient system. Compliance and risk mitigation are also integral, incorporating sophisticated mechanisms to ensure regulatory adherence and financial stability.\n\n## Modules\n\nEach module within this knowledge base covers a specific area of the Gurufin project:\n\n### Gurufin Chain Whitepaper (Governance)\nThis module details the foundational principles, vision, and governance mechanisms of the Gurufin Chain. It outlines the decision-making processes, roles of stakeholders, and the overall framework guiding the project's evolution.\n\n### 01 Dex Overview (Getting Started)\nAn introductory guide to the Gurufin Decentralized Exchange (DEX), explaining its core functionalities, user interface, and how to get started with trading and liquidity provision.\n\n### 02 What Is Gurufin (Reserve & Backing)\nExplores the core identity of Gurufin, focusing on its stablecoin's reserve assets, backing mechanisms, and the fundamental principles that ensure its stability and value.\n\n### 02 Stablecoin Fx Trading (Interoperability)\nDelves into the stablecoin's utility in foreign exchange (FX) trading, highlighting its interoperability features that enable seamless cross-currency transactions.\n\n### 04 Smart Contract Logic (Activation)\nProvides an in-depth look at the smart contract architecture underpinning Gurufin's operations, detailing how these contracts are activated and managed for various platform functions.\n\n### 01 Protocol Overview (Protocol Overview)\nOffers a high-level summary of the entire Gurufin protocol, outlining its various components, their interactions, and the overall vision for the platform.\n\n### 01 Cross Border Payments (Risk Mitigation)\nFocuses on Gurufin's solutions for efficient and secure cross-border payments, emphasizing the risk mitigation strategies employed to ensure reliable transactions.\n\n### 01 Overview (Compliance Framework)\nAn introductory module that outlines the regulatory and compliance framework within which Gurufin operates, ensuring adherence to global standards.\n\n### 02 Hybrid Pools (Smart Contracts)\nExplores the concept and implementation of hybrid liquidity pools within Gurufin's DEX, detailing how smart contracts manage and optimize these pools.\n\n### 05 Compliance And Regulation (Compliance & Regulation)\nA comprehensive module on Gurufin's approach to compliance and regulatory matters, covering legal frameworks, policies, and operational safeguards.\n\n### 02 Network Architecture (Network Architecture)\nDetails the underlying technical architecture of the Gurufin network, including its blockchain structure, consensus mechanisms, and node operations.\n\n### 03 Mint And Burn (Burning Process)\nExplains the economic mechanisms behind the Gurufin stablecoin, specifically how new tokens are minted and existing ones are burned to maintain peg stability.\n\n### 06 Governance (Delegators)\nFocuses on the governance model, particularly the role of delegators in the decision-making process and their influence on the Gurufin ecosystem.\n\n### 07 Validator Guide (Security)\nA practical guide for network validators, detailing their responsibilities, security protocols, and operational procedures to maintain network integrity.\n\n### 04 Ecosystem Grant Program (Application Process)\nDescribes the Gurufin Ecosystem Grant Program, outlining the application process and criteria for projects seeking funding to build on the platform.\n\n### 04 Guru Peg (Benefits)\nExplains the mechanics of the Guru Peg, Gurufin's stablecoin pegging mechanism, and the benefits it provides to users and the overall ecosystem.\n\n### 04 Multi Currency Support (Cross-Chain Interoperability)\nHighlights Gurufin's capabilities for supporting multiple currencies and its approach to achieving seamless cross-chain interoperability.\n\n### 02 Reserve And Backing (24/7 Live Proof-of-Reserves)\nProvides details on the continuous, transparent proof-of-reserves mechanism that underpins the Gurufin stablecoin, ensuring its 24/7 backing.\n\n### 03 Liquidity And Rewards (Liquidity & Rewards)\nCovers the strategies for providing liquidity to the Gurufin DEX and the various reward structures available to liquidity providers.\n\n### 05 Tokenomics (Economic Sustainability)\nAnalyzes the economic model of the Gurufin token, including its distribution, utility, and mechanisms designed to ensure long-term economic sustainability.\n\n### Other (External Resource)\nA catch-all module for references to external resources, documentation, or relevant information outside the immediate knowledge base.\n\n### 02 Api Reference (API Reference)\nA technical reference for Gurufin's Application Programming Interfaces (APIs), providing developers with the tools and documentation to integrate with the platform.\n\n### 03 Interoperability (Canonical Asset Registry)\nFocuses on Gurufin's approach to interoperability through the implementation of a canonical asset registry, facilitating cross-chain asset transfers.\n\n### 04 Government And Cbdc (Atomic PvP Settlement:)\nExplores Gurufin's potential applications in government and Central Bank Digital Currency (CBDC) contexts, particularly regarding atomic peer-to-peer settlement.\n\n### 05 Risk Mitigation (Layer 1: Reserve Fund)\nDetails the first layer of risk mitigation within Gurufin, specifically the role and management of the reserve fund in safeguarding asset stability.\n\n### Summary (Developer Resources)\nA concise overview of resources available to developers, including documentation, SDKs, and tools for building on the Gurufin platform.\n\n### 01 Testnet Access (API Ports)\nProvides information on accessing the Gurufin Testnet, including details on API ports and connectivity for development and testing purposes.\n\n### 03 Roadmap (Phase 2: Expansion)\nOutlines the project's future development plans, specifically focusing on the expansion phase and upcoming features.\n\n### Oracle Priced Reserve Swap (OPRS) Execution:\nDetails the execution process of Oracle Priced Reserve Swaps, a mechanism for efficient and fair asset exchange within the ecosystem.\n\n### [GX Stablecoin Network](../gx_chain/01_overview.md)\nAn overview of the GX Stablecoin Network, a related or integrated component of the Gurufin ecosystem.\n\n### [Network Architecture](./02_network_architecture.md)\nA direct link to the network architecture documentation for detailed technical understanding.\n\n### How to Build on Gurufin for Cross-Border Payments\nA guide for developers on leveraging the Gurufin platform to build solutions for cross-border payments.\n\n### Jurisdictional Compliance\nAddresses the complexities of jurisdictional compliance and how Gurufin navigates various legal and regulatory landscapes.\n\n### Tokenized Assets\nDiscusses the concept and implementation of tokenized assets within the Gurufin ecosystem.\n\n### 100% Fiat-Backed Reserves:\nHighlights the commitment to 100% fiat-backed reserves for the stablecoin, ensuring its stable value.\n\n### Bank API Connectivity:\nDetails the integration capabilities with traditional banking systems via APIs.\n\n### Prices are determined by real-world FX rates\nExplains how the platform's pricing mechanisms are tied to real-world foreign exchange rates.\n\n### Stablecoin Spot Trading Platforms:\nCovers the various platforms where Gurufin's stablecoin can be spot-traded.\n\n### Structured Product Issuance:\nDiscusses the issuance of structured financial products on the Gurufin platform.\n\n### Block Explorer\nProvides information on the block explorer tool for monitoring and verifying transactions on the Gurufin Chain.\n\n### DeFi Interoperability\nExplores Gurufin's role and capabilities in the broader DeFi ecosystem, focusing on interoperability.\n\n### Gurufin Chain Integration\nDetails the process and benefits of integrating with the Gurufin Chain.\n\n### Selective Disclosure\nAddresses mechanisms for selective disclosure of information, particularly relevant for privacy and compliance.\n\n### [GuruDex Overview](../gurudex/01_dex_overview.md)\nA direct link to the GuruDex overview for quick access.\n\n### Interoperability and Compliance\nExamines the interplay between interoperability features and compliance requirements.\n\n### Example: Institutional RFQ FX Trading\nProvides a practical example of institutional Request for Quote (RFQ) FX trading on the platform.\n\n### Swap Flow for Retail Users:\nIllustrates the typical swap transaction flow for individual retail users.\n\n### Use Case Scenarios for CBDC\nOutlines various potential use cases for Central Bank Digital Currencies (CBDCs) leveraging Gurufin technology.\n\n## Cross-Module Relationships\n\n```mermaid\ngraph LR\n    A[\"Other (External Resource)\"] --> R1[\"02 Stablecoin Fx Trading (Interoperability)\"]\n    R1 --> R2[\"04 Government And Cbdc (Atomic PvP Settlement:)\"]\n    R2 --> R1\n    CBP[\"01 Cross Border Payments (Risk Mitigation)\"] --> R1\n    CBP --> SVR[\"Summary (Developer Resources)\"]\n    CBP --> RM[\"05 Risk Mitigation (Layer 1: Reserve Fund)\"]\n    CBP --> DO[\"01 Dex Overview (Getting Started)\"]\n    DO --> SVR\n    DO --> HP[\"02 Hybrid Pools (Smart Contracts)\"]\n    R1 --> IAR[\"03 Interoperability (Canonical Asset Registry)\"]\n    GW[\"Gurufin Chain Whitepaper (Governance)\"] --> R1\n    GW --> DO\n    GW --> CBP\n    GW --> GP[\"04 Guru Peg (Benefits)\"]\n    GW --> LR[\"03 Liquidity And Rewards (Liquidity & Rewards)\"]\n    PO[\"01 Protocol Overview (Protocol Overview)\"] --> GW\n```"}, {"name": "Gurufin Chain Whitepaper (Governance)", "file": "governance.md", "content": "# Gurufin Chain Whitepaper (Governance)\n\nThis page outlines the governance framework for the Gurufin Chain, a public Delegated Proof-of-Stake (DPoS) Layer-1 blockchain built on the Cosmos SDK. The governance model ensures decentralized decision-making through community participation, primarily by validators and token holders, to manage and evolve the network.\n\n## Key Concepts\n\n### Governance\nThe core of Gurufin Chain's evolution lies in its on-chain **Governance** system. This robust framework enables decentralized decision-making. Participation is collective, with both **Validators** and **Delegators** playing crucial roles.\n\n### Delegated Proof-of-Stake (DPoS)\nGurufin Chain utilizes **Delegated Proof-of-Stake (DPoS)** as its consensus mechanism, directly impacting governance. Token holders delegate their GXN tokens to trusted validators. These validators, elected through this process, are responsible not only for block production but also for representing the network in voting on various proposals. Delegators indirectly participate by choosing validators and sharing in rewards and responsibilities. The [GXN token](./gurufin_chain_whitepaper.md#tokenomics-gxn) is central to this, enabling staking for network security and governance participation.\n\n### Proposal Process\nThe lifecycle of changes and decisions on the Gurufin Chain adheres to a structured **Proposal Process**:\n1.  **Submit Proposal**: Any protocol change or treasury allocation begins with a proposal submission, which requires a deposit.\n2.  **Discussion Phase**: After submission, there is a **Discussion Phase** where community members can provide feedback and deliberate on the proposal's merits.\n3.  **Voting Period**: Proposals then enter a **Voting Period**, typically lasting seven days. During this time, participants can vote Yes, No, Abstain, or No with Veto. A quorum (10-20% of bonded voting power) is required for parameter changes.\n4.  **Execution**: Upon successful approval, the proposal undergoes an automatic **Execution** phase, often after a 72-hour timelock to allow for final checks and preparation. All approved changes are transparently recorded and enacted on-chain.\n\n### Proposal Types\nThe governance system supports different categories of **Proposal Types** to manage various aspects of the Gurufin Chain:\n*   **Parameter Changes**: These include adjustments to network configurations such as fee structures, staking requirements, and consensus parameters.\n*   **Protocol Upgrades**: Proposals for protocol upgrades introduce new features, add modules, or implement essential security patches.\n*   **Treasury Allocation**: This category covers proposals related to the distribution of treasury funds for purposes like development grants, marketing initiatives, and community incentives.\n\n### Upgrade Mechanism\nAs a critical aspect of **Governance**, the **Upgrade Mechanism** allows the Gurufin Chain to evolve. This involves implementing **Protocol Upgrades** passed through the **Proposal Process**, ensuring the network can adapt to new technologies, security needs, and community demands.\n\n## Important Details\n\n*   Gurufin Chain's governance is designed for transparency, with all protocol changes being transparently recorded and enacted on-chain.\n*   The DPoS model balances decentralization with performance, crucial for the chain's focus on high-performance financial applications.\n*   The Gurufin Chain is built on the Cosmos SDK with Tendermint BFT consensus, providing sub-second finality and throughput of up to 10,000 TPS, which are critical for financial applications requiring settlement certainty.\n*   The governance model aligns incentives among validators, liquidity providers, governance participants, and end-users, fostering a robust and stable ecosystem."}, {"name": "01 Dex Overview (Getting Started)", "file": "getting-started.md", "content": "## 01 Dex Overview (Getting Started)\n\nThe \"01 Dex Overview (Getting Started)\" module introduces GuruDex, an FX-specialized decentralized exchange, and guides users through its core concepts and initial access points. This page serves as a foundational entry for understanding how GuruDex operates and where to find more detailed information.\n\n## What is GuruDex?\n\nGuruDex is an FX-specialized decentralized exchange designed for seamless swaps between sovereign stablecoins on the Gurufin Chain. Unlike general-purpose DEXs that rely on Automated Market Makers (AMMs), GuruDex utilizes an **Oracle Priced Reserve Swap (OPRS)** architecture. This architecture is purpose-built for on-chain stablecoin FX trading, emphasizing price stability and accurate FX rates.\n\n## Key Concepts and Relationships\n\n### Gurudex Overview\n\nGuruDex is primarily concerned with stablecoin FX trading, a domain where price discovery and peg maintenance are critical. The `GuruDex Overview` clarifies that its key differentiator is its specialization.\n\n### Why OPRS, Not AMM?\n\nThe module highlights the fundamental difference between GuruDex's OPRS mechanism and traditional AMMs. AMMs are often limited in stablecoin FX trading due to challenges with price discovery, slippage, liquidity, and peg maintenance. OPRS addresses these by providing a solution specifically tailored to accurate, low-slippage stablecoin swaps.\n\n### Architecture\n\nThe `Architecture` of GuruDex, specifically the OPRS architecture, is a core concept. Further details are explored in the \"02 OPRS Architecture\" and \"04 Smart Contracts\" documentation. This architecture is closely related to the `GX Stablecoins` that GuruDex handles, which themselves have a specific `Mint/Burn Mechanism` described in \"03 Mint & Burn\". The `Developer` concept is supported by further documentation regarding the architecture and smart contracts.\n\n### GX Stablecoins\n\nGuruDex facilitates trading of `GX Stablecoins`. These are sovereign stablecoins, each pegged 1:1 to a respective fiat currency. Examples mentioned in context include `USGX Chain`, `KRGX Chain`, `EURGX Chain`, and `JPGX Chain`, each representing a specific jurisdictional currency. The architecture of GX Chain is described as a network of independent Layer-1 chains.\n\n### Oracle Priced Reserve Swap (OPRS)\n\nThe `Oracle Priced Reserve Swap (OPRS)` is the central mechanism of GuruDex. Instead of relying on liquidity pools, OPRS uses `oracle-priced FX rates` to guide a `mint/burn mechanism`. This ensures trades execute at precise market rates with **no slippage**. Related concepts such as `oracle security`, `freshness`, `deviation`, and `confidence` are critical for the reliable functioning of OPRS, with \"triple validation\" being a key security measure for institutional trades. The `How OPRS Works` section further details this process, including `IBC Settlement` for cross-chain stablecoin movements.\n\n### Getting Started and Testnet Access\n\nFor developers and users looking to engage with GuruDex, `Getting Started` is facilitated through readily available `Documentation` and `Testnet Access`. The Testnet provides a sandbox environment with specific network configuration parameters (Chain ID: `guru_631-1`, RPC Endpoint: `https://trpc.gurufin.io`, etc.) and a faucet for obtaining test tokens.\n\n### Compliance Integration\n\nWhile not a primary focus of this overview, `Compliance Integration` is mentioned, indicating the platform's commitment to regulatory frameworks. This involves aspects like `institutional registry`, `transaction monitoring`, and adherence to `jurisdictional rules`.\n\n### Related Documentation\n\nThe module provides convenient quick links to `Related Documentation` for deeper dives into topics like `Settlement Layer` (Gurufin Chain Whitepaper) and `Reserves` (GX Chain Overview).\n\n## Important Details from Source Excerpts\n\n*   GuruDex is specialized for FX trading of sovereign stablecoins on the Gurufin Chain.\n*   It utilizes an Oracle Priced Reserve Swap (OPRS) architecture, deliberately avoiding traditional AMMs.\n*   OPRS ensures **zero slippage** and relies on real-world oracle rates.\n*   The mint-and-burn mechanism for stablecoins is guided by oracle FX rates for swaps.\n*   Security for institutional trades includes \"triple validation\" checks for `freshness` (data < 5 minutes old), `deviation` (< 1% from stored rate), and `confidence` (> 95% oracle score).\n*   Testnet access is available with specific network parameters and a faucet for test tokens.\n*   GuruDex is part of a larger ecosystem including the Gurufin Chain (a DPoS Layer-1 settlement layer) and GX Chain (a network of sovereign stablecoin PoA chains)."}, {"name": "02 What Is Gurufin (Reserve & Backing)", "file": "reserve-backing.md", "content": "# 02 What Is Gurufin (Reserve & Backing)\n\nThis module provides a foundational understanding of Gurufin, focusing specifically on its core components and, most importantly, the robust reserve and backing mechanisms that ensure the stability and trustworthiness of its GX Stablecoins. It outlines how Gurufin combines blockchain efficiency with stringent regulatory compliance to create a specialized financial infrastructure.\n\n## What is Gurufin?\nGurufin is a specialized financial infrastructure that leverages blockchain technology for efficient, stable, and compliant financial operations. It is built upon two interconnected pillars:\n\n*   **Gurufin Chain**: A public, permissionless Layer-1 blockchain built on Cosmos SDK with Tendermint BFT consensus. It acts as a neutral FX/DeFi settlement hub, facilitating cross-border payments and trading. Its native token, GXN, is used for staking, governance, and fee payments via Guru-PEG. It boasts sub-second finality and high throughput (up to 10,000 TPS) with IBC-first interoperability.\n*   **GX Stablecoin Network**: A federation of sovereign stablecoin chains, each operating under its own jurisdiction. These chains feature licensed validators governed by Proof-of-Authority (PoA) consensus. GX Stablecoins are fully backed 1:1 by fiat reserves held in regulated custodians, with automated minting and burning facilitated by bank API integration. The system also includes 24/7 live proof-of-reserves attestation to ensure transparency and trust.\n\nTogether, these components create a seamless system: GX Stablecoins are minted when users deposit fiat through licensed partners, are then transferred to the Gurufin Chain via IBC for trading and DeFi activities, and can be redeemed back to fiat at any time.\n\n## Reserve & Backing of GX Stablecoins\n\nThe integrity and stability of GX Stablecoins are fundamentally underpinned by a rigorous **Reserve & Backing** framework. Each stablecoin issued on a GX chain is fully collateralized by fiat currency held in reserve at a 1:1 ratio. This strict backing model is crucial for maintaining the stablecoin's price stability and ensuring that holders can redeem their tokens for fiat currency without risk of shortfall.\n\n### Key Aspects of Reserve & Backing:\n*   **1:1 Fiat Backing**: Every GX stablecoin is backed 1:1 by fiat currency held in reserve.\n*   **Automated Minting and Burning**: This 1:1 parity is enforced through automated minting and burning mechanisms. Token issuance occurs only upon the verified receipt of fiat funds via integrations with licensed banking partners' secure APIs. Conversely, redemption triggers the corresponding fiat transfer, ensuring continuous balance between tokens in circulation and fiat reserves.\n*   **Reserve Composition**: Reserve assets primarily consist of highly liquid and low-risk instruments to ensure capital preservation and immediate liquidity. While the exact composition may vary by jurisdiction based on local regulatory requirements and banking partnerships, at launch, 100% of reserves are maintained in cash at licensed custodian banks, with binding concentration limits.\n*   **Future Reserve Allocation (Capped Fraction)**: In jurisdictions where expressly permitted by domestic regulation, a *capped fraction* of reserves may be allocated to ultra-short Treasury bills (typically under 3 months maturity). These are managed on a roll-down ladder, and liquidity against such securities is raised via pre-arranged repo facilities.\n*   **Compliance and Regulation**: The GX Stablecoin Network emphasizes **Compliance**, with each sovereign stablecoin chain operating under its own jurisdiction and adhering to local legal and financial frameworks. Licensed validators enforce a jurisdictional Proof-of-Authority (PoA) consensus.\n\nThe **Reserve & Backing** mechanism is a critical component that links directly to the overall definition of **What is Gurufin?** by providing the essential trust and stability for the GX Stablecoin Network, which in turn fuels the Gurufin Chain's DeFi capabilities. This transparent and auditable reserve system is a core differentiator, supporting Gurufin's ambition for institutional adoption."}, {"name": "02 Stablecoin Fx Trading (Interoperability)", "file": "interoperability.md", "content": "# 02 Stablecoin FX Trading (Interoperability)\n\nGurufin Chain revolutionizes foreign exchange (FX) markets by providing a purpose-built blockchain infrastructure optimized for stablecoins, tokenized assets, and cross-border payments. This module details how Gurufin's architecture enables seamless, secure, and efficient FX trading, arbitrage, and derivatives applications, emphasizing its advanced interoperability features.\n\n## Overview of Stablecoin FX Trading on Gurufin\n\nGurufin Chain acts as a neutral, global on-chain FX and DeFi hub specifically designed for stablecoins and tokenized fiat assets. It supports deep liquidity pools for stablecoin pairs, facilitating everything from retail remittances to enterprise FX flows and institutional trading with minimal slippage and predictable fees. The GX Stablecoin Network complements this by providing sovereign, fiat-backed stablecoins with robust compliance and reserve transparency.\n\nThe core of Gurufin's FX trading mechanism is the **Oracle Priced Reserve Swap (OPRS)** architecture. This system leverages oracle-guided pricing with automated mint/burn mechanics for all swap executions, ensuring trades occur at precise market rates without slippage.\n\n### Key Concepts and Relationships\n\n*   **Stablecoin FX Trading on Gurufin**: At its heart, this module focuses on the transformative approach to FX markets facilitated by Gurufin's specialized blockchain. It provides a platform for efficient and secure trading of stablecoins against various fiat currencies, enabling arbitrage and derivatives based on real-world exchange rates.\n    *   **Interoperability**: A fundamental aspect of Gurufin's design, interoperability is crucial for enabling the seamless flow of stablecoins and other tokenized assets across different blockchain ecosystems. This allows for diverse FX pairs and broad liquidity.\n\n*   **Benefits of Stablecoin FX Trading on Gurufin**: This outlines the concrete advantages for users and institutions leveraging the platform.\n    *   **Fiat-Predictable Fees**: Gurufin utilizes the Guru-PEG (Price Equilibrium Governance) mechanism to index gas fees to stable fiat values, providing predictable and low transaction costs (e.g., ~$0.013 per L1 transfer). This is a significant benefit for high-frequency FX trading.\n    *   **High Throughput & Finality**: With sub-second finality and throughput of up to 10,000 transactions per second (achieved through Tendermint BFT consensus), Gurufin ensures near-instant settlement certainty crucial for FX markets.\n    *   **Hybrid Liquidity Pools**: These pools are integral to the OPRS architecture, enabling efficient swaps by combining different liquidity strategies.\n    *   **IBC-First Interoperability**: Gurufin's foundational design prioritizes the Inter-Blockchain Communication (IBC) protocol, allowing trust-minimized, atomic cross-chain operations with other Cosmos SDK chains, enhancing the network's global reach and asset diversity.\n    *   **Regulatory Compliance**: Built-in compliance hooks and a Proof-of-Authority (PoA) consensus for GX Stablecoin Network ensure that stablecoin FX trading adheres to regulatory standards, fostering institutional adoption.\n    *   **Privacy Options**: Features supporting various privacy levels cater to different user and institutional needs within the FX trading environment.\n    *   **Automated Mint/Burn**: This mechanism, essential to the OPRS architecture, allows for dynamic adjustment of stablecoin supply based on demand and swap execution, maintaining peg stability and enabling frictionless FX.\n    *   **Dynamic Fee Mechanism**: Gurufin employs adaptable fee structures that optimize for market conditions while maintaining predictability.\n\n*   **Technical Architecture Summary**: This provides the underlying framework that supports Gurufin's FX trading capabilities.\n    *   **Consensus**: The platform utilizes a Tendermint BFT consensus with Delegated Proof-of-Stake (DPoS) on the Gurufin Chain, ensuring high performance, security, and deterministic finality. The GX Stablecoin Network uses a jurisdictional Proof-of-Authority (PoA) consensus.\n    *   **Hybrid Execution Fabric**: This refers to the synergistic combination of various execution environments, such as native Cosmos and EVM compatibility, to support a wide range of FX trading applications.\n    *   **Oracle Network**: Critical for the OPRS architecture, the oracle network provides real-time, accurate market data for pricing stablecoin swaps, eliminating slippage.\n    *   **Liquidity Layer**: Gurufin's innovative liquidity layer ensures deep and efficient markets for stablecoin pairs, minimizing price impact for large FX trades.\n    *   **Interoperability**: As mentioned, Gurufin's three-layered approach (IBC, EVM Gateway, GatewayGX Module) is central to its ability to connect diverse blockchain ecosystems for FX trading.\n    *   **Compliance & Privacy**: Integrated modules ensure adherence to regulatory requirements and offer flexible privacy solutions, making the platform suitable for institutional and retail FX participants.\n\n## Interoperability Explained\n\nGurufin Chain is engineered with a robust three-layer interoperability stack:\n\n1.  **IBC Protocol (Inter-Blockchain Communication)**: Gurufin adopts an IBC-first architecture. This enables trust-minimized cross-chain communication and asset transfers with other Cosmos ecosystem chains. IBC uses escrowed message passing (ICS-20/27 standards) to enforce Payment-versus-Payment (PvP) settlement, ensuring atomic transactions and eliminating reliance on central bridge operators through light client verification and cryptographic proofs.\n2.  **EVM Gateway**: This connects Gurufin Chain to the Ethereum ecosystem and all EVM-compatible chains (e.g., Polygon, Arbitrum, Optimism, BNB Chain). It allows ERC-20 tokens to be wrapped and transferred to Gurufin, supports cross-chain contract invocation, and integrates with standard Ethereum tooling like MetaMask.\n3.  **GatewayGX Module**: For heterogeneous chains outside the Cosmos and EVM ecosystems, such as Solana, the GatewayGX Module provides connectivity, further expanding Gurufin's reach for stablecoin FX trading.\n\nThis comprehensive interoperability strategy positions Gurufin as a global on-chain FX and DeFi hub, capable of facilitating complex stablecoin-based foreign exchange operations across a fragmented blockchain landscape. Gurufin Chain's architecture, including its IBC-first design and EVM compatibility, contributes directly to its role as a neutral FX settlement layer, critical for efficient and compliant stablecoin FX trading."}, {"name": "04 Smart Contract Logic (Activation)", "file": "activation.md", "content": "# Smart Contract Logic (Activation)\n\nThe \"Smart Contract Logic (Activation)\" module details the process by which institutional users gain full trading capabilities within the GuruDex ecosystem, specifically focusing on the critical **Activation** step. This module is a core component of the broader [Smart Contract Logic] that governs operations, ensuring controlled and permissioned access for institutional participants.\n\n## What is Activation?\n\n**Activation** is the third stage in the multi-step [Institutional Onboarding] workflow on GuruDex. Following successful [Registration] and off-chain [Verification], Activation involves an authorized operator configuring specific trading parameters for an institutional user. This step is crucial for customizing the trading environment to meet the institution's requirements and for enforcing platform policies.\n\n## Key Concepts and Relationships\n\n*   **Activation**: This is the central concept of this module. It refers to the final technical setup of an institutional account on-chain after off-chain verification. During activation, an operator defines key parameters that will govern the institution's interactions with the platform.\n\n*   **Institutional Onboarding**: Activation is an integral part of this broader process. Without successful activation, an institutional user, despite having registered and been verified, cannot proceed to full [Authorization] and begin trading.\n\n*   **Institutional Users**: Activation directly impacts these users. It enables their trading capabilities and customizes their experience based on defined limits, fees, and parameters.\n\n*   **InstitutionalRegistry**: This contract plays a vital role in storing and managing institutional profiles and permissions. After activation, the parameters set during this step are likely recorded and managed within the `InstitutionalRegistry` to enable the platform's contracts, such as the [OPRSProcessor], to properly route and execute trades for these users.\n\n*   **Smart Contract Logic**: Activation is a specific implementation detail within the overall `Smart Contract Logic` of GuruDex. It demonstrates how different contracts, like the `InstitutionalRegistry` and potentially the `OPRSProcessor`, work together to manage user access and trading parameters.\n\n## Activation in the Onboarding Flow\n\nAs per the source excerpts, the institutional onboarding process flows sequentially:\n\n1.  **Registration**: Initial submission of basic information via `registerInstitution()`.\n2.  **Verification**: Off-chain KYC/AML review by an operations team.\n3.  **Activation**: An operator configures custom limits, fees, and other parameters for the institution. This is where the specific trading rules for the institution are set up on-chain.\n4.  **Authorization**: The institution approves specific coins and pools they wish to access, giving them the final green light to trade.\n\n## Important Details\n\n*   Activation is performed by an \"Operator,\" implying a privileged role responsible for managing institutional access.\n*   The parameters set during activation, such as custom limits, fees, and other user-specific configurations, are fundamental to defining the operational scope for institutional users. These parameters differentiate institutional trading experiences from those of [Retail Users].\n*   While not explicitly stated for activation, the **OPRSProcessor** relies on the **InstitutionalRegistry** to determine user type and route swaps accordingly (to the institutional OPRS path with oracle-verified pricing and custom parameters). This implies that the parameters set during activation are crucial for the `OPRSProcessor` to function correctly for institutional trades."}, {"name": "01 Protocol Overview (Protocol Overview)", "file": "protocol-overview.md", "content": "# Protocol Overview\n\nThe \"Protocol Overview\" module provides a foundational understanding of the Gurufin ecosystem, primarily focusing on the Gurufin Chain—a purpose-built Layer-1 blockchain designed for global on-chain foreign exchange (FX) and decentralized finance (DeFi). This overview highlights the core architecture, capabilities, and underlying principles that make Gurufin a specialized financial infrastructure for the Web3 economy.\n\n## What is Gurufin Chain?\n\nGurufin Chain is a public, permissionless Layer-1 blockchain built on the Cosmos SDK and utilizes Tendermint BFT consensus. Unlike general-purpose blockchains, it is specifically optimized for stablecoins, tokenized assets, and cross-border payments. It acts as a neutral FX/DeFi settlement hub where cross-border payments and trading can occur efficiently and securely.\n\nThe chain addresses critical challenges in blockchain adoption for traditional finance, including:\n*   Unpredictable transaction fees\n*   Cross-chain fragmentation\n*   Regulatory uncertainty\n\nThrough its innovative Guru-PEG mechanism, IBC-first architecture, and built-in compliance modules, Gurufin Chain aims to provide a reliable foundation for institutions and retail users to engage with Web3 finance.\n\n## Key Features and Concepts\n\n### High Performance\nGurufin Chain is engineered for high performance, boasting sub-second finality and a throughput of up to 10,000 transactions per second (TPS). This deterministic finality, which contrasts with probabilistic consensus mechanisms requiring multiple confirmations, is crucial for financial applications where settlement certainty is paramount.\n\n### Interoperability\nInteroperability is a cornerstone of Gurufin Chain's design, achieved through a three-layered approach:\n*   **Native Cosmos IBC:** For trust-minimized communication with other Cosmos-based blockchains.\n*   **EVM Gateway:** Provides compatibility with the Ethereum ecosystem.\n*   **GatewayGX module:** Extends connectivity to non-standard chains, such as Solana.\n\nThis comprehensive approach ensures the chain can connect multiple blockchain ecosystems, facilitating a fluid movement of assets and data across diverse environments.\n\n### Financial Infrastructure\nGurufin Chain is explicitly built for financial use cases, supporting features like Oracle Priced Reserves. It forms one of the two interconnected pillars of the Gurufin ecosystem, the other being the GX Stablecoin Network. Together, these components create a complete system where GX Stablecoins are minted from fiat deposits, utilized on Gurufin Chain for trading and DeFi, and can be redeemed back to fiat seamlessly.\n\n### Native Token (GXN)\nThe Gurufin Chain utilizes GXN as its native token. GXN serves multiple functions within the ecosystem, including:\n*   Staking\n*   Governance\n*   Payment of fees via the Guru-PEG mechanism\n\n## Relationship to Other Concepts\n\nThe \"Protocol Overview\" is intrinsically linked to several other core concepts within the Gurufin documentation:\n\n*   **Financial Infrastructure:** The Gurufin Chain itself is presented as a specialized financial infrastructure, contrasting it with general-purpose blockchains.\n*   **Technology Stack:** The overview details core components of the Gurufin Chain's technology stack, such as Cosmos SDK, Tendermint BFT, IBC, and the EVM Gateway.\n*   **What Makes Gurufin Different:** The challenges Gurufin Chain aims to solve (unpredictable fees, fragmentation, regulatory uncertainty) directly contribute to its unique value proposition and differentiate it within the blockchain landscape.\n\nFor a deeper dive into the technical details of GXN, the Guru-PEG mechanism, or the GX Stablecoin Network, refer to the respective documentation sections."}, {"name": "01 Cross Border Payments (Risk Mitigation)", "file": "risk-mitigation.md", "content": "# 01 Cross Border Payments (Risk Mitigation)\n\nThe \"01 Cross Border Payments (Risk Mitigation)\" module focuses on how Gurufin addresses the inherent challenges in cross-border transactions, specifically emphasizing the strategies and technologies employed to reduce risks. This module details the benefits of using Gurufin for such payments, the critical components that enable them, and the robust risk mitigation framework in place.\n\n## Understanding Cross-Border Payments\n\n[[Cross-Border Payments]] are an essential yet complex part of the global financial system. Traditional methods often suffer from high costs, slow settlement times, and significant counterparty risks, such as principal and bridge risk. Gurufin offers a transformative solution by leveraging blockchain technology to create an efficient, low-cost, and secure infrastructure suitable for both retail remittances and enterprise-level B2B transactions.\n\nGurufin Chain, a public Delegated Proof-of-Stake (DPoS) Layer-1 blockchain built on the Cosmos SDK with Tendermint BFT consensus, is specifically designed to facilitate stablecoin issuance, tokenized assets, and cross-border payments. It serves as a neutral FX/DeFi settlement hub.\n\n## Benefits of Using Gurufin for Cross-Border Payments\n\nGurufin provides several key [[Benefits of Using Gurufin for Cross-Border Payments]] that directly address the pain points of traditional cross-border payment systems:\n\n*   **[[Cost Efficiency]]**: Gurufin Chain's architecture, including its Guru-PEG (Price Equilibrium Governance) mechanism, indexes gas fees to stable fiat values, providing predictable and low transaction costs (e.g., ~$0.013 per L1 transfer).\n*   **[[Speed and Finality]]**: The platform achieves deterministic sub-second finality with Byzantine Fault Tolerant (BFT) consensus, ensuring near-instant settlement. This is critical for payment certainty.\n*   **[[Risk Mitigation]]**: Gurufin implements a comprehensive strategy to protect against FX volatility, market manipulation, and operational risks.\n*   **[[Deep Liquidity]]**: While not explicitly detailed in the provided excerpts for this section, deep liquidity is a core benefit enabling efficient large-scale transactions.\n*   **[[Transparency and Trust]]**: The blockchain-based nature of Gurufin, combined with features like 24/7 live proof-of-reserves attestation for GX Stablecoins, fosters greater transparency and builds trust.\n\n## Technical Components of Cross-Border Payments\n\nThe [[Technical Overview of Cross-Border Payment Components]] highlights the core technologies enabling Gurufin's cross-border payment capabilities:\n\n*   **[[GX Stablecoin Chain]]**: Gurufin utilizes a federation of sovereign stablecoin chains, each operating under its own jurisdiction. These stablecoins are fully backed 1:1 by fiat reserves held in regulated custodians, with automated minting and burning via bank API integration and 24/7 live proof-of-reserves attestation.\n*   **[[FXSwap Hybrid Pools]]**: This concept, though not fully elaborated in the provided excerpts, is a fundamental part of the Gurufin ecosystem, likely contributing to efficient foreign exchange operations within cross-border payments.\n*   **[[Compliance Layer]]**: Gurufin Chain is built with \"built-in compliance hooks for institutional adoption,\" ensuring that the infrastructure adheres to necessary regulatory standards.\n\n## Risk Mitigation Strategies\n\n[[Risk Mitigation]] is a paramount concern in cross-border payments, and Gurufin implements a robust, 4-layer defense strategy to safeguard against various risks:\n\n*   **Layer 1: Reserve Fund**: An insurance fund, holding 5-10% of pool liquidity (managed separately for retail and institutional segments), compensates for losses due to rapid rate fluctuations. This fund is automatically replenished from trading fees when thresholds are breached.\n*   **Layer 2: Dynamic Fees**: Retail fees adjust in real-time based on pool utilization and market volatility. While typically 0.3%, fees can scale up to 0.63% during stress, discouraging speculative trading and protecting pool equilibrium.\n*   **Layer 3: Limits & Validation**: Individual swaps are capped at 5% of pool liquidity to prevent market manipulation by large \"whales.\" Additionally, institutional trades undergo a triple oracle validation process:\n    *   **Freshness**: Data must be less than 5 minutes old.\n    *   **Deviation**: Price must be within 1% of the stored rate.\n    *   **Confidence**: Oracle confidence score must exceed 95%.\n*   **Layer 4: Circuit Breaker**: Trading automatically halts if critical thresholds are breached, such as a >5% price swing, >20% liquidity drain, or suspicious transaction patterns. This provides operators with response time and prevents cascading losses during attacks or major market crises.\n\nThese layers work in conjunction to ensure high system robustness, even under adverse market conditions, making Gurufin a reliable platform for cross-border transactions."}, {"name": "01 Overview (Compliance Framework)", "file": "compliance-framework.md", "content": "# 01 Overview (Compliance Framework)\n\nThis module provides a high-level overview of the Compliance Framework underpinning the GX Chain. It explains how the GX Chain is structured to adhere to regulatory requirements and ensure institutional assurance across various jurisdictions.\n\n## What is GX Chain?\n\nThe GX Chain is a sovereign stablecoin framework designed to support fiat-backed digital currencies. It operates not as a single blockchain, but as a **network of independent Layer-1 chains**. Each of these chains issues a local sovereign stablecoin, pegged 1:1 to its respective fiat currency. This unique architecture is specifically designed to enable regulatory compliance, transparency, and operational efficiency, tailoring to each jurisdiction's distinct legal and financial frameworks.\n\n## Key Concepts\n\n### Compliance Framework\nThe overarching structure that governs the GX Chain's operations, ensuring adherence to regulatory standards. This framework is intrinsically linked to **Wallet Tiers**, where different tiers might have varying compliance requirements.\n\n### Jurisdictional Model\nThe GX Chain employs a **Jurisdictional Model** where each Layer-1 chain is tailored to a specific jurisdiction's legal and financial frameworks. This model dictates which **Supported Currencies** can be issued and traded within that specific chain.\n\n### Proof-of-Authority (PoA) Consensus\nThe GX Chain utilizes **Proof-of-Authority Consensus** as its underlying consensus mechanism. This type of consensus inherently facilitates strong **Governance Control**, as participating validators are pre-approved and vetted entities.\n\n### Institutional Assurance\nTo provide trust and reliability, the GX Chain focuses on **Institutional Assurance**. This concept is built upon several pillars:\n*   **Licensed Validators**: The network relies on a select group of approved and **Licensed Validators** who operate the Layer-1 chains. This ensures accountability and adherence to regulatory standards.\n*   **Formal Audits**: Regular and **Formal Audits** are conducted to verify the integrity, security, and compliance of the GX Chain's operations.\n*   **Insurance**: To further safeguard participants, **Insurance** mechanisms are in place, providing a layer of protection against unforeseen events or failures.\n\n### Governance Control\nEnabled by the Proof-of-Authority Consensus, **Governance Control** refers to the mechanisms and policies that ensure the network operates according to its established rules and regulatory obligations.\n\n### Supported Currencies\nThese are the fiat-backed digital currencies issued on the GX Chain, with each currency operating within a specific **Jurisdictional Model**.\n\n### Wallet Tiers\nDifferent levels of user accounts or wallets within the GX Chain ecosystem, often associated with varying levels of identity verification and transaction limits, as dictated by the **Compliance Framework**.\n\n## Relationship Summary\n\nThe **GX Chain Overview** highlights its nature as a network of **Sovereign Stablecoin Networks** built on **Jurisdiction-Specific PoA Chains**. The **Compliance Framework** is central to its design, influencing aspects like **Wallet Tiers** and how **Supported Currencies** are managed within different **Jurisdictional Models**. The adoption of **Proof-of-Authority Consensus** directly enables robust **Governance Control**. Furthermore, **Institutional Assurance** is achieved through the use of **Licensed Validators**, regular **Formal Audits**, and the provision of **Insurance**."}, {"name": "02 Hybrid Pools (Smart Contracts)", "file": "smart-contracts.md", "content": "## 02 Hybrid Pools (Smart Contracts)\n\nThis module focuses on the \"02 Hybrid Pools\" concept within the GuruDex ecosystem, specifically detailing the **Oracle Priced Reserve Swap (OPRS) architecture** as an alternative to traditional Automated Market Maker (AMM) pools. It elaborates on how **Smart Contracts** facilitate this unique mechanism for stablecoin Foreign Exchange (FX) trading.\n\n### Key Principles of OPRS\n\nThe **Key Principle** behind OPRS is that trade prices are determined by real-world oracle rates, rather than by on-chain supply and demand dynamics within liquidity pools. This design ensures trades execute at precise market rates with **zero slippage**, which is particularly well-suited for stablecoin FX trading.\n\n### How Oracle Priced Reserve Swap (OPRS) Works\n\nThe **OPRS Architecture** operates on a mint-and-burn mechanism guided by oracle FX rates, rather than maintaining liquidity pools with constant product formulas. The process for a user initiating a swap is as follows:\n\n1.  **User initiates a swap**: A user desires to exchange one stablecoin for another (e.g., USGX for KRGX).\n2.  **Oracle provides real-time FX rate**: An oracle fetches and provides the current, accurate exchange rate between the two stablecoins (e.g., 1 USD = 1,300 KRW). This **Oracle Validation** is crucial for the reliability of the system.\n3.  **Input stablecoin is burned**: The stablecoin that the user is exchanging (input stablecoin) is burned on its respective sovereign chain (e.g., 1,000 USGX is burned on the USGX Chain).\n4.  **Output stablecoin is minted**: A corresponding amount of the desired stablecoin (output stablecoin) is minted on its respective sovereign chain, based on the oracle's real-time FX rate and deducting any fees (e.g., 1,298,700 KRGX is minted on the KRGX Chain).\n5.  **IBC atomic settlement**: The entire transaction, including the burning and minting of stablecoins across different chains, is settled atomically using **IBC atomic settlement**, ensuring that the entire operation either succeeds or fails together.\n\n### Why OPRS for Stablecoin FX?\n\nThe OPRS architecture is specifically designed for the nuances of stablecoin FX trading. Traditional AMMs are prone to impermanent loss and slippage, which are undesirable for assets pegged to real-world currencies. By leveraging real-time oracle rates, OPRS provides a more stable, efficient, and reliable method for exchanging stablecoins, directly addressing the requirements for institutional adoption.\n\n### Smart Contracts and Sovereign Chain Integration\n\nThe entire OPRS process is orchestrated by **Smart Contracts**. These contracts handle the logic for input stablecoin burning, output stablecoin minting, and the integration with oracles to fetch real-time FX rates. The system also relies on **Sovereign Chain Integration**, as each stablecoin (e.g., USGX, KRGX) resides on its own dedicated chain within the GX Stablecoin Network. The Gurufin Chain, built on Cosmos SDK, acts as a neutral FX/DeFi settlement hub, facilitating cross-chain operations via **IBC-first interoperability**."}, {"name": "05 Compliance And Regulation (Compliance & Regulation)", "file": "compliance-regulation.md", "content": "# 05 Compliance & Regulation\n\nThe \"Compliance & Regulation\" module outlines the foundational principles and technical implementations that ensure GX stablecoins operate within established legal and regulatory frameworks. This module emphasizes a proactive approach, integrating compliance directly into the core design of the GX infrastructure to facilitate secure, transparent, and legally sound stablecoin operations across various jurisdictions.\n\n## Core Principles\n\nThe GX stablecoin ecosystem is inherently designed to meet diverse global compliance and regulatory requirements. This involves a multi-faceted strategy that balances the inherent transparency and efficiency of blockchain technology with the stringent demands of financial oversight. The overarching goal is to enable the issuance, transfer, and redemption of stablecoins in a manner that is consistently aligned with the legal frameworks of their respective jurisdictions.\n\n## Key Member Concepts\n\n### Jurisdictional PoA Model\nAt the core of GX's compliance strategy is its **Permissioned Proof-of-Authority (PoA) consensus mechanism**. This model entails independent Layer-1 blockchains, each dedicated to a sovereign stablecoin and tied to a specific jurisdiction. Validators on these GX chains are licensed and regulated entities, authorized by local financial authorities. They are responsible for block validation and consensus participation, ensuring all on-chain activities adhere to local regulatory standards. This approach offers:\n*   **Jurisdictional Control**: Validators operate directly under local laws.\n*   **Enhanced Security**: Achieved through permissioned participation.\n*   **Regulatory Alignment**: Enforced at the consensus level.\n\n### KYC/AML Integration\n**Know Your Customer (KYC)**, **Know Your Business (KYB)**, and **Anti-Money Laundering (AML)** procedures are critical for preventing illicit financial activities. GX chains implement \"wallet-tier compliance,\" requiring users and institutions to undergo identity verification before engaging in transactions. This ensures a robust defense against financial crimes.\n\n### FATF Travel Rule Support\nThe Financial Action Task Force (FATF) Travel Rule mandates that Virtual Asset Service Providers (VASPs) share originator and beneficiary information for transactions exceeding certain thresholds. GX's architecture is designed to support the implementation of this rule, ensuring compliance with international standards for combating money laundering and terrorist financing in the crypto space.\n\n### Supervisory Oversight\nEffective regulatory compliance requires robust **Supervisory Oversight**. This concept outlines the mechanisms and frameworks through which relevant financial authorities monitor and guide the operations of GX stablecoins, ensuring adherence to established laws and prudent financial practices.\n\n### Key Security and Governance Controls\nBeyond regulatory mandates, the module covers **Key Security and Governance Controls**. These are the internal mechanisms and best practices implemented to secure the GX ecosystem, manage risks, and maintain the integrity and reliability of stablecoin operations. This includes internal audits, access controls, and operational procedures.\n\n### Hardware Security Modules (HSMs)\n**Hardware Security Modules (HSMs)** play a crucial role in safeguarding cryptographic keys and performing sensitive operations. Their integration ensures a high level of security for critical processes, protecting against unauthorized access and tampering.\n\n### Emergency Procedures and Circuit Breakers\nThe module also details **Emergency Procedures and Circuit Breakers**. These are pre-defined protocols and automated systems designed to mitigate risks and protect the ecosystem during unforeseen events, such as market volatility, security breaches, or compliance violations. They provide a rapid response capability to maintain stability and integrity.\n\n### Zero-Knowledge Proofs and Privacy\nFinally, **Zero-Knowledge Proofs (ZKPs) and Privacy** are considered for enhancing transaction privacy while maintaining compliance. ZKPs allow for verification of information (e.g., identity or transaction validity) without revealing the underlying data, offering a balance between privacy and regulatory transparency.\n\n## Relationship with Other Concepts\n\nAll the member concepts directly relate to **Compliance & Regulation**. The Jurisdictional PoA Model, KYC/AML Integration, FATF Travel Rule Support, Supervisory Oversight, Key Security and Governance Controls, Hardware Security Modules (HSMs), Emergency Procedures and Circuit Breakers, and Zero-Knowledge Proofs and Privacy are all integral components that collectively contribute to the secure, compliant, and regulated operation of the GX stablecoin ecosystem. They represent the diverse facets of an infrastructure built with regulatory adherence as a primary design objective."}, {"name": "02 Network Architecture (Network Architecture)", "file": "network-architecture.md", "content": "# Network Architecture\n\nThis page details the underlying structure and operational mechanisms of the Gurufin Chain, focusing on its consensus engine and the various node types that constitute the network's decentralized infrastructure. Understanding these components is crucial for comprehending how Gurufin Chain achieves its goals of fast, secure, and final transactions, particularly within the context of financial applications.\n\n## Key Concepts\n\nThe Gurufin Chain's network architecture is designed for robust performance and security, integrating several core concepts:\n\n### Consensus Engine: Tendermint BFT + DPoS\n\nGurufin Chain employs a hybrid consensus mechanism that combines the strengths of **Tendermint Byzantine Fault Tolerant (BFT)** and **Delegated Proof-of-Stake (DPoS)**.\n\n*   **Tendermint BFT**: This is the core engine responsible for achieving agreement among network validators. It utilizes a three-phase voting process: Propose, Prevote, and Precommit, culminating in a Block Finalized state. A key advantage of Tendermint BFT is its resilience; the network remains secure even if up to one-third of validators are malicious or offline. Furthermore, once a block is committed, it achieves immediate finality, meaning it cannot be reversed and requires no additional confirmations.\n*   **Delegated Proof-of-Stake (DPoS)**: DPoS governs participation in the consensus process. Token holders delegate their native GXN tokens to trusted validators. The validators with the highest amount of delegated stake form the active validator set, and block producers are selected based on their stake weight. This design strikes a balance between decentralization and performance, allowing for efficient block production while still distributing control.\n\n### Node Types\n\nThe Gurufin network comprises different types of **nodes**, each fulfilling a specific function:\n\n*   **Validator Node**: These are critical participants in the network. They participate in the consensus process, produce new blocks, and vote on proposals. Validator nodes are typically run by professional operators who have a significant amount of GXN staked, demonstrating their commitment and investment in the network's security.\n*   **Full Node**: A full node maintains a complete copy of the entire blockchain history. It plays a vital role in relaying transactions across the network and ensuring data integrity. These nodes are often run by infrastructure providers and developers who need access to the full chain state.\n*   **Archive Node**: An archive node stores all historical states of the blockchain. Unlike a full node which may prune older states, an archive node preserves every single state change, making it invaluable for historical queries, analytics services, and auditing purposes.\n*   **Light Client**: While not detailed in the provided excerpts, light clients are generally lightweight nodes that do not store the entire blockchain history. Instead, they verify transactions and block headers by relying on information provided by full nodes, making them suitable for resource-constrained environments or applications that only need to verify specific data without the overhead of running a full node.\n\n## Relationship to Performance\n\nThe chosen network architecture, particularly the **Tendermint BFT + DPoS** consensus mechanism, directly contributes to the Gurufin Chain's **performance**. The design aims for \"sub-second finality and throughput of up to 10,000 TPS,\" which are crucial metrics for a financial infrastructure. The efficient block finalization provided by Tendermint and the scalable validator set management enabled by DPoS are key enablers of these performance targets.\n\n## Important Details from Source Excerpts\n\n*   Gurufin Chain is a public, permissionless Layer-1 blockchain built on the Cosmos SDK.\n*   The native token, GXN, is used for staking, governance, and fee payment.\n*   The network is \"IBC-first\" for interoperability, with an EVM Gateway for Ethereum ecosystem compatibility.\n*   The overall Gurufin ecosystem includes the Gurufin Chain and the GX Stablecoin Network, with GX Stablecoins flowing to Gurufin Chain for trading and DeFi activities."}, {"name": "03 Mint And Burn (Burning Process)", "file": "burning-process.md", "content": "# 03 Mint And Burn (Burning Process)\n\nThe \"03 Mint And Burn\" module details the mechanisms ensuring the automated issuance (minting) and redemption (burning) of sovereign stablecoins. This process is critically linked to real-world fiat reserves held by licensed banking partners, employing secure API integrations to guarantee that every token action has a corresponding fiat movement. This design aims to eliminate manual reconciliation delays and prevent risks such as double issuance or redemption.\n\nWhile the module title encompasses both minting and burning, this specific page focuses on the **Burning Process**.\n\n## Key Concepts\n\nThe burning process involves several interconnected concepts:\n\n*   **Burning Process**: This is the core mechanism by which stablecoins are redeemed for fiat currency. When a user wishes to convert their stablecoins back into fiat, this process facilitates the secure and verified destruction of those stablecoins on the blockchain and the subsequent release of fiat.\n*   **Quorum Authorization**: A crucial security and validation step where a predefined minimum number of validators must approve a transaction (in this case, a burn request) before it can be executed. This distributed approval mechanism enhances trust and prevents single points of failure or malicious actions.\n*   **Idempotency**: This principle ensures that executing the same operation multiple times produces the same result as executing it once. In the context of burning, it means a burn request, once processed, cannot be processed again, preventing accidental or malicious double redemptions.\n*   **Deterministic Finality**: Guarantees that once a transaction (like a burn) is committed to the blockchain, it cannot be reverted or changed. This provides absolute assurance to users and banks that their transactions are irreversible and final, often within sub-second times.\n*   **Key Safeguards**: While not explicitly detailed for the burning process in the provided excerpt, this concept broadly refers to all security measures, protocols, and checks implemented to protect the integrity of the system. In burning, this would include compliance checks, reserve sufficiency verification, and user authorization.\n*   **Live Reserve Scanner (LRS)**: Although the excerpt doesn't directly mention LRS for burning, it's inferred that a mechanism similar to the Live Reserve Scanner (used for minting to detect fiat deposits) would be crucial during burning to confirm fiat availability before release or to reconcile once released.\n*   **RTGS Settlement Alignment**: Likely refers to the system's integration with Real-Time Gross Settlement (RTGS) systems used by banks for high-value transactions. This ensures that the fiat movement corresponding to a stablecoin burn is settled in real-time, aligning the digital and traditional financial systems. While the excerpt doesn't explicitly link RTGS to burning, it's a critical component for seamless fiat movements.\n*   **Minting Process**: Though not the focus, understanding the minting process (how stablecoins are created) provides necessary context, as burning is its inverse operation.\n\n## The Burning Process Explained\n\nWhen a user initiates a stablecoin redemption, the **Burning Process** begins:\n\n1.  **User Request**: The user submits a burn request through the GX chain gateway. This request is assigned a unique identifier (`burn request ID`).\n2.  **Verification**: The system's validators then perform several critical checks:\n    *   **Compliance**: Ensuring the transaction adheres to all regulatory and internal compliance standards.\n    *   **Reserve Sufficiency**: Verifying that sufficient fiat reserves are available in the linked banking partner's account to fulfill the redemption. While the excerpt mentions \"reserve sufficiency\" for verification, it implicitly suggests a real-time check.\n    *   **User Authorization**: Confirming that the user initiating the burn request is legitimate and authorized to burn the specified amount of stablecoins.\n3.  **Quorum Authorization**: After verification, licensed validators engage in a **Quorum Authorization** process. A certain threshold of validators must approve the burn request.\n4.  **Fiat Release (System Conf...)**: Upon achieving quorum approval, the fiat currency is released to the user. The excerpt cuts off here, but it implies that the stablecoins are simultaneously burned (destroyed) on the GX chain, mirroring the fiat release. The system would also perform an **Idempotency** check to prevent unintended multiple redemptions for the same request.\n5.  **Deterministic Finality**: The entire burn transaction, including the destruction of stablecoins and the authorization of fiat release, achieves **Deterministic Finality** rapidly, providing an irreversible record on the blockchain.\n\n## Important Details from Source Excerpts\n\n*   The Mint & Burn Mechanism's primary goal is to provide automated issuance and redemption of sovereign stablecoins.\n*   The process is \"tightly integrated with licensed banking partners via secure APIs,\" ensuring a direct link between on-chain token movements and off-chain fiat movements.\n*   This integration specifically aims to \"eliminate manual reconciliation delays and mitigates risks associated with double issuance or redemption.\"\n*   While the excerpt primarily describes the *initiation* and *verification* steps of the burning process, it clearly highlights the roles of \"user submission,\" \"validators,\" \"compliance,\" \"reserve sufficiency,\" and \"user authorization.\"\n*   The concept of Quorum Authorization is explicitly mentioned as a critical step in both minting and is implicitly crucial for burning's security.\n*   Deterministic Finality is a core property of transactions on the GX chain, ensuring the irreversible nature of both mint and burn operations."}, {"name": "06 Governance (Delegators)", "file": "delegators.md", "content": "# Governance (Delegators)\n\nThe \"06 Governance (Delegators)\" module details the role and participation of **Delegators** within the Gurufin Chain's decentralized governance framework. It highlights how delegators contribute to decision-making and protocol evolution through the Delegated Proof-of-Stake (DPoS) consensus mechanism.\n\n## Overview\n\nGurufin Chain leverages an on-chain governance system that necessitates the collective participation of both **Validators** and **Delegators**. This system ensures decentralized decision-making by allowing token holders to influence various aspects of the protocol.\n\n## Key Concepts\n\n### Delegators\n\n**Delegators** are token holders who participate in the network's governance indirectly. Instead of running their own validator nodes, they delegate their staked GRFN tokens to trusted **Validators**. By doing so, delegators confer their voting power to the chosen validator, enabling that validator to represent their interests in governance proposals. In return for delegating, delegators typically share in both the rewards generated by the validator (e.g., from block production) and the responsibilities associated with their validator's actions.\n\n### Relationship with Validators\n\nThe relationship between **Delegators** and **Validators** is symbiotic:\n*   **Delegators** elect **Validators** by allocating their stake, thereby determining which nodes produce blocks and hold significant voting power.\n*   **Validators** act as representatives for their delegated stake in governance votes and are responsible for maintaining network security and functionality.\n\n## Governance Process and Delegator Influence\n\nWhile **Delegators** do not directly submit or vote on proposals, their choice of **Validator** is crucial. Their delegated stake contributes to the total bonded voting power of a validator, directly impacting the validator's influence on the outcome of proposals.\n\nThe governance system handles various **Proposal Types**, including:\n*   **Parameter Changes**: Adjustments to network parameters like transaction fees, staking requirements, or consensus configurations.\n*   **Protocol Upgrades**: Implementation of new features, additions of new modules, or security patches to the core protocol.\n*   **Treasury Allocation**: Decisions regarding the use of community funds for development grants, marketing initiatives, or other community incentives.\n\nAll proposals undergo a structured lifecycle:\n1.  **Submission**: Proposals require a deposit to be submitted.\n2.  **Voting Period**: A standard 7-day voting window where validators (representing their delegators) can vote \"Yes,\" \"No,\" \"Abstain,\" or \"No with Veto.\"\n3.  **Timelock & Execution**: Approved proposals enter a 72-hour timelock before automatic execution on-chain, ensuring transparency and providing a buffer period.\n\nFor **Parameter Changes**, a specific quorum requirement of 10–20% of bonded voting power is in place, demonstrating the importance of widespread participation (indirectly via delegators' stake) in critical network adjustments."}, {"name": "07 Validator Guide (Security)", "file": "security.md", "content": "## 07 Validator Guide (Security)\n\nThe \"07 Validator Guide (Security)\" module outlines the critical security considerations and practices for Gurufin Chain validators. As validators are the backbone of the network's security and consensus, maintaining robust security measures is paramount to protect the integrity of the blockchain and the staked GXN tokens. This guide details the essential requirements and best practices validators must adhere to to safeguard their operations and the network.\n\n### Key Concepts and Relationships\n\nThis module\nprimarily focuses on the **Security** aspect within the broader **Validator Guide**. It details specific **Requirements** related to securing a validator operation.\n\n*   **Security**: This is the central concept, encompassing all measures taken to protect validator keys, infrastructure, and operations from malicious attacks or accidental compromise.\n*   **Requirements**: Validators must meet stringent security requirements as part of their operational standards. These include specific protocols for key management and operational hygiene.\n*   **Hardware**: While the general \"Hardware\" concept covers the physical infrastructure, within the security context, it refers to specialized hardware components designed for enhanced security, such as Hardware Security Modules (HSMs).\n*   **Stake**: A validator's \"Stake\" (bonded GXN tokens) is directly impacted by security incidents. Security breaches can lead to **Slashing & Jailing** penalties, resulting in the loss of staked tokens and temporary or permanent exclusion from the active validator set.\n*   **Slashing & Jailing**: Poor security practices, leading to actions like double-signing or extended downtime, trigger these penalties, highlighting the direct financial incentive for strong security.\n*   **Uptime**: Although primarily an operational metric, maintaining high \"Uptime\" also has security implications. Proper security measures, like DDoS protection via sentry nodes, contribute to uninterrupted service and prevent downtime-related penalties.\n*   **Rewards**: Conversely, maintaining high security and operational integrity ensures that validators can consistently earn their \"Rewards\" for contributing to the network's security and consensus.\n\n### Important Details from Source Excerpts\n\nThe source excerpts emphasize the following security aspects for Gurufin Chain validators:\n\n*   **Key Material Protection**: Validator key material **must** be held in Hardware Security Modules (HSMs) or managed via Multi-Party Computation (MPC) with threshold signatures. This is a critical requirement designed to prevent unauthorized access to the cryptographic keys used for signing blocks and transactions.\n*   **Operational Security Policies**: Validators are required to implement robust security practices, including key rotation policies and well-defined break-glass procedures. These policies are essential for managing cryptographic keys securely over time and for responding effectively to security incidents.\n*   **Sentry Node Architecture**: To enhance resilience and protect against Distributed Denial of Service (DDoS) attacks, validators are required to employ a sentry node architecture. This setup helps maintain high availability and protects the primary validator node from direct exposure to the internet.\n*   **Consequences of Security Breaches**: The system has severe penalties for security failures. Double-signing (equivocation), which can occur if keys are compromised or due to misconfiguration, results in a severe slash of staked GXN and permanent jailing. Extended downtime, potentially caused by a successful attack, also leads to partial stake slashing and temporary jailing. These penalties underscore the importance of robust security measures to protect the validator's stake."}, {"name": "04 Ecosystem Grant Program (Application Process)", "file": "application-process.md", "content": "# Ecosystem Grant Program (Application Process)\n\nThis module outlines the **Application Process** for the **Ecosystem Grant Program** offered by the Gurufin Foundation. This program provides funding to support the development of applications, tools, and infrastructure that expand the Gurufin Chain ecosystem.\n\n## Key Concepts and Relationships\n\nThe application process is a core component of the broader Ecosystem Grant Program. Understanding the various stages and related concepts is crucial for prospective applicants.\n\n*   **Ecosystem Grant Program:** This is the overarching initiative by the Gurufin Foundation to fund projects built on Gurufin Chain. Its primary goal is to foster growth and innovation within the ecosystem.\n*   **Eligible Projects:** These are specific categories of projects that the Gurufin Foundation is interested in funding. They include:\n    *   **DeFi:** Decentralized Finance applications like DEX integrations, lending protocols, and yield aggregators.\n    *   **Infrastructure:** Foundational tools such as indexers, oracles, bridges, and developer tooling.\n    *   **Applications:** User-facing applications like wallets, payment solutions, and analytics dashboards.\n    *   **Education:** Resources that help expand knowledge and adoption, such as tutorials, documentation, and community resources.\n*   **Application Process:** This defines the step-by-step procedure that applicants must follow to apply for a grant. It comprises the following stages:\n    1.  **Submit Proposal:** The initial step where applicants detail their project, team, proposed milestones, and funding requirements.\n    2.  **Review:** The stage where the Gurufin Foundation team evaluates the submitted proposal for its feasibility, technical merit, and alignment with ecosystem needs.\n    3.  **Approval:** If the project is accepted after the review, it moves to this stage where funding is allocated, typically on a milestone-based schedule.\n    4.  **Delivery:** The final stage where grant recipients complete their milestones and receive subsequent funding tranches upon successful completion.\n*   **Contact:** Information on how to reach the Gurufin Foundation for inquiries related to the grant program. This is typically done through official channels listed on gurufin.io.\n\n## Important Details from Source Excerpts\n\n*   **Purpose:** The Gurufin Foundation's grant program aims to support \"builders creating applications, tools, and infrastructure on Gurufin Chain\" and \"provides funding for projects that expand the ecosystem.\"\n*   **Milestone-Based Funding:** Approved projects receive funding in tranches, contingent upon the successful completion of predetermined milestones.\n*   **Official Contact:** All grant inquiries should be directed via the official channels listed on [gurufin.io](https://gurufin.io)."}, {"name": "04 Guru Peg (Benefits)", "file": "benefits.md", "content": "# 04 Guru PEG Benefits\n\nGuru-PEG (Price Equilibrium Governance) is a core innovation of the Gurufin Chain, designed to deliver predictable and stable transaction costs for all users. This module explores the significant advantages and benefits that Guru-PEG brings to the Gurufin ecosystem, primarily by mitigating the volatility and unpredictability often associated with gas fees on traditional blockchain networks.\n\n## Key Benefits of Guru-PEG\n\nThe fundamental design of Guru-PEG provides several crucial benefits, making Gurufin Chain a more user-friendly and economically viable platform for various applications, including micropayments and complex DeFi operations.\n\n### Predictable Transaction Costs\n\nOne of the primary benefits of Guru-PEG is the *Predictability Guarantees* it offers for transaction costs. Unlike conventional blockchains where gas fees can fluctuate wildly with token prices and network congestion, Guru-PEG ensures users can reliably forecast their transaction expenses. This stability is achieved by indexing fees to fiat currency and having a largely stable *Fiat Target*.\n\n### Fiat-Indexed Fees\n\nGuru-PEG's fee mechanism calculates the fee in GXN based on a specified *Fiat Target*. This means that whether the *GXN Price* goes up or down, the fiat equivalent of the transaction cost remains largely consistent. For instance, a standard transfer might cost approximately $0.013, regardless of the GXN token's market value. This indexing provides a stable economic environment for users and developers alike.\n\n### Stability During Congestion\n\nEven during periods of high network demand, Guru-PEG aims to maintain relative fee stability. While a *Surge Multiplier* is introduced to factor in congestion, its impact is capped (up to ~2×). This prevents the exorbitant fee spikes seen on other chains, ensuring that the cost of transactions remains manageable even under load.\n\n### Economic Viability for Micropayments\n\nTraditional blockchains often render micropayments uneconomical due to high and unpredictable fees. Guru-PEG’s stable and low transaction costs (e.g., $0.013 for a standard transfer, $0.040 for asset/NFT operations) make micropayments feasible and attractive on the Gurufin Chain, opening up new use cases.\n\n### Easier Budgeting and Planning\n\nThe predictability offered by Guru-PEG makes it significantly easier for individuals and businesses to budget for their blockchain activities. Developers can build applications with confidence, knowing the operational costs for their users will remain stable. This contrasts sharply with systems where budgeting for blockchain interactions is a constant challenge due to volatile fees.\n\n### Inflation Adjustment\n\nTo maintain the real value of transaction costs over time, Guru-PEG's *Fiat Target* fees are adjusted periodically (annually or quarterly) using the Consumer Price Index (CPI). This ensures that the purchasing power equivalent of the fees remains consistent, adapting to macroeconomic changes without impacting short-term predictability.\n\n## How Guru-PEG Delivers These Benefits\n\nThe benefits of Guru-PEG are direct outcomes of its underlying mechanism, as detailed in *How Guru-PEG Works*:\n\nThe fee in GXN is calculated as follows:\n\n`Fee (GXN) = Fiat Target ÷ GXN Price × Surge Multiplier`\n\n*   **Fiat Target**: A base fee in fiat (e.g., $0.013 for a standard transfer) set by governance. This is the cornerstone of fiat-indexing.\n*   **GXN Price**: The current GXN price in fiat, provided by an oracle network, ensures the GXN fee dynamically adjusts to maintain its fiat equivalent.\n*   **Surge Multiplier**: A congestion factor that remains 1.0 under normal load and can reach up to ~2× during high demand. This limited multiplier prevents excessive fee hikes during peak usage.\n\nThis formula ensures that irrespective of the GXN token's market fluctuations, the user experiences a stable cost in fiat terms for their transactions, creating a highly efficient and predictable fee model."}, {"name": "04 Multi Currency Support (Cross-Chain Interoperability)", "file": "cross-chain-interoperability.md", "content": "# 04 Multi Currency Support (Cross-Chain Interoperability)\n\nThe \"04 Multi Currency Support (Cross-Chain Interoperability)\" module details how the GX Chain architecture facilitates the management and exchange of stablecoins across various jurisdictions an
